server:
  port: 80

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:digital_waiter_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: dw

redis:
  cart:
    ttl-hours: ${REDIS_CART_TTL:1}
  menu:
    ttl-minutes: ${REDIS_MENU_TTL:10}

iiko:
  url: https://api-ru.iiko.services
  db-login: ${IIKO_DB_LOGIN}
  operation:
    status-check:
      max-attempts: ${IIKO_STATUS_CHECK_MAX_ATTEMPTS:5}
      delay-ms: ${IIKO_STATUS_CHECK_DELAY_MS:500}
  webhooks:
    token: ${IIKO_WEBHOOKS_TOKEN}
  notifications:
    token: ${IIKO_NOTIFICATIONS_TOKEN}

digital-waiter:
  url: https://digital-waiter.sberlab.nsu.ru

local:
  url: http://localhost:8081

gigachat:
  api-key: ${GIGACHAT_API_KEY}
  scope: ${GIGACHAT_SCOPE:GIGACHAT_API_PERS}
  model: ${GIGACHAT_MODEL:GigaChat}
  api-url: ${GIGACHAT_API_URL:https://gigachat.devices.sberbank.ru/api/v1}

token:
  signing:
    key: ${TOKEN_AUTH_KEY}
  duration:
    access: ${TOKEN_DURATION_ACCESS:60}
    update: ${TOKEN_DURATION_UPDATE:1440}

crypto:
  api-key:
    secret: ${API_KEY_CRYPTO_SECRET}

password:
  length: ${PASSWORD_LENGTH:8}

notifications:
  expiration:
    expiration-minutes: 15
    fixed-delay-ms: 300000
  retry:
    retry-seconds: 60
    fixed-delay-ms: 60000

vosk:
  server:
    http:
      url: http://vosk-server:2701

payment:
  qr:
    url: https://i.ibb.co/JWCrMDXQ/qr-code-3.png
